services:
  postgres:
    image: postgres:16-alpine
    container_name: repopilot-postgres
    environment:
      POSTGRES_DB: repopilot
      POSTGRES_USER: repopilot
      POSTGRES_PASSWORD: repopilot
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repopilot -d repopilot"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - repopilot-postgres-data:/var/lib/postgresql/data

volumes:
  repopilot-postgres-data:
